<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page: #dce8f5;
    --bg-card: #111827;
    --bg-card-inner: #1e2d3d;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --gradient-card: linear-gradient(160deg, #4fc3f7 0%, #3b82f6 40%, #7c3aed 100%);
    --gradient-bottom-bar: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.65);
    --text-muted: rgba(255,255,255,0.4);
    --card-border: rgba(255,255,255,0.05);
    --inner-card-bg: rgba(255,255,255,0.07);
    --selected-day: rgba(255,255,255,0.95);
    --font: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg-page);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    max-width: 1100px;
    width: 100%;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    background: var(--gradient-card);
    border-radius: 28px;
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    overflow: hidden;
    min-height: 680px;
    box-shadow: 0 24px 60px rgba(59,130,246,0.3);
  }

  .panel-left::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 260px; height: 260px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    pointer-events: none;
  }

  .day-name {
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.5px;
  }

  .date-text {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
  }

  .location {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .location svg { opacity: 0.75; flex-shrink: 0; }

  .weather-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px 0;
  }

  .sun-icon {
    width: 80px; height: 80px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sun-core {
    width: 34px; height: 34px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
  }

  .sun-rays {
    position: absolute;
    inset: 0;
    animation: spin 12s linear infinite;
  }

  .ray {
    position: absolute;
    width: 3px; height: 12px;
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
    left: 50%; top: 0;
    transform-origin: 50% 40px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .temperature {
    font-size: 4.5rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -2px;
    line-height: 1;
  }

  .condition {
    font-size: 1.3rem;
    color: var(--accent-blue);
    font-weight: 500;
    color: rgba(255,255,255,0.9);
  }

  .feels-like {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .sun-times {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }

  .sun-box {
    background: rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 16px;
    backdrop-filter: blur(8px);
  }

  .sun-box-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .sun-box-time {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text-primary);
    font-family: var(--font-mono);
  }

  /* ── RIGHT PANEL ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .stat-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 18px 20px;
    border: 1px solid var(--card-border);
    transition: transform 0.2s ease;
  }
  .stat-card:hover { transform: translateY(-2px); }

  .stat-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text-primary);
    font-family: var(--font-mono);
  }

  .env-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .env-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 22px 24px;
    border: 1px solid var(--card-border);
  }

  .env-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .env-value {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    font-family: var(--font-mono);
  }

  .env-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ── HOURLY FORECAST ── */
  .forecast-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 22px 24px;
    border: 1px solid var(--card-border);
  }

  .forecast-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 18px;
  }

  .hourly-list {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .hourly-list::-webkit-scrollbar { display: none; }

  .hour-item {
    flex-shrink: 0;
    background: var(--inner-card-bg);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 72px;
    border: 1px solid var(--card-border);
    transition: background 0.2s;
  }
  .hour-item:hover { background: rgba(255,255,255,0.12); }

  .hour-time {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .hour-icon { font-size: 1.5rem; line-height: 1; }

  .hour-temp {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ── 7-DAY FORECAST ── */
  .weekly-list {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .weekly-list::-webkit-scrollbar { display: none; }

  .day-item {
    flex-shrink: 0;
    background: var(--inner-card-bg);
    border-radius: 14px;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 82px;
    border: 1px solid var(--card-border);
    transition: background 0.2s;
    cursor: pointer;
  }
  .day-item:hover { background: rgba(255,255,255,0.12); }

  .day-item.active {
    background: var(--selected-day);
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .day-item.active .day-label,
  .day-item.active .day-temp { color: #111827; }

  .day-label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .day-icon { font-size: 1.6rem; line-height: 1; }

  .day-temp {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    background: var(--gradient-bottom-bar);
    border-radius: 16px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s;
    box-shadow: 0 8px 30px rgba(99,102,241,0.35);
  }
  .bottom-bar:hover { opacity: 0.9; }
</style>
</head>
<body>

  <article aria-label="Weather widget for Biarritz, FR">

    <section class="panel">
      
      <header>
        <h1>Thursday <time datetime="2026-02-27">27 February 2026</time></h1>
        <address>Biarritz, FR</address>
      </header>

      <footer>
        <img src="" alt="Partly sunny icon" width="64" height="64" />
        <p><strong>18 °C</strong></p>
        <p>Sunny</p>
      </footer>
    </section>

    <section aria-label="Weather details and forecast">

      <table aria-label="Current weather statistics">
        <tbody>
          <tr>
            <th scope="row">Precipitation</th>
            <td>0%</td>
          </tr>
          <tr>
            <th scope="row">Humidity</th>
            <td>58%</td>
          </tr>
          <tr>
            <th scope="row">Wind</th>
            <td>10 km/h</td>
          </tr>
        </tbody>
      </table>

      <nav aria-label="7-day forecast">
        <h2>7-Day Forecast</h2>
        <ol>
          <li>
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Monday">Mon</abbr>
            <strong>20 °C</strong>
          </li>
          <li>
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Tuesday">Tue</abbr>
            <strong>17 °C</strong>
          </li>
          <li aria-current="date">
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Wednesday">Wed</abbr>
            <strong>17 °C</strong>
          </li>
          <li>
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Thursday">Thu</abbr>
            <strong>18 °C</strong>
          </li>
          <li>
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Friday">Fri</abbr>
            <strong>13 °C</strong>
          </li>
          <li>
            <img src="" alt="Rain" width="32" height="32" />
            <abbr title="Saturday">Sat</abbr>
            <strong>12 °C</strong>
          </li>
          <li>
            <img src="" alt="Partly sunny" width="32" height="32" />
            <abbr title="Sunday">Sun</abbr>
            <strong>18 °C</strong>
          </li>
        </ol>
      </nav>

      <button type="button">
        <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        New York City
      </button>

    </section>

  </article>

</body>
</html>
